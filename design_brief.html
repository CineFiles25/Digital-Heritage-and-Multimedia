    <style>
        @font-face {
            font-family: 'IM Fell English';
            src: url('assets/fonts/IMFellEnglish-Regular.ttf') format('truetype');
            font-style: normal;
        }

        @font-face {
            font-family: 'IM Fell English';
            src: url('assets/fonts/IMFellEnglish-Italic.ttf') format('truetype');
            font-style: italic;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #C9B99A;
            position: relative;
            font-family: 'IM Fell English', serif;
        }

        #bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            mix-blend-mode: multiply;
            background-repeat: repeat;
        }

        .content {
            position: relative;
            z-index: 1;
            background-color: #8B3A2A;
            width: 60%;
            min-height: 100vh;
            margin: 40px auto;
            padding: 60px 50px;
            border: 3px solid #1C1A17;
            outline: 2px solid rgba(28, 26, 23, 0.35);
            outline-offset: -12px;
        }

        nav {
            display: flex;
            justify-content: center;
            margin-bottom: 48px;
            border-bottom: 2px solid #1C1A17;
            padding: 12px 0;
        }

        nav a {
            color: #C9B99A;
            text-decoration: none;
            font-family: 'IM Fell English', serif;
            font-size: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0.85;
            padding: 0 24px;
            border-right: 2px solid rgba(28, 26, 23, 0.6);
        }

        nav a:last-child {
            border-right: none;
        }

        nav a:hover,
        nav a.active {
            opacity: 1;
            font-weight: bold;
        }

        .page-title {
            font-family: 'IM Fell English', serif;
            color: #C9B99A;
            font-size: 2.2rem;
            font-weight: normal;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 36px;
            padding-bottom: 36px;
        }

        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 2px solid #1C1A17;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .footer-icons {
            display: flex;
            gap: 40px;
        }

        .footer-meta {
            color: #C9B99A;
            font-family: 'IM Fell English', serif;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            opacity: 0.65;
            text-align: center;
            font-style: italic;
        }

        .footer-meta a {
            color: inherit;
            text-decoration: underline;
            text-decoration-color: rgba(201, 185, 154, 0.45);
        }

        .footer-meta a:hover {
            text-decoration-color: #C9B99A;
        }

        footer a {
            color: #C9B99A;
            text-decoration: none;
            opacity: 0.8;
            display: flex;
            align-items: center;
        }

        footer a:hover {
            opacity: 1;
        }

        footer a svg {
            width: 28px;
            height: 28px;
            fill: #C9B99A;
        }

        .footer-icon-item {
            position: relative;
            display: flex;
        }

        .footer-icon-item::after {
            content: attr(data-name);
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background-color: #1C1A17;
            color: #C9B99A;
            font-family: 'IM Fell English', serif;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            font-style: italic;
            padding: 6px 14px;
            white-space: nowrap;
            border: 1px solid #C9B99A;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .footer-icon-item:hover::after {
            opacity: 1;
        }
    </style>
</head>

    <script>
        (function () {
            const SIZE = 200;
            const PAD  = 10;
            const CELL = SIZE + PAD * 2;
            const canvas = document.createElement('canvas');
            canvas.width  = CELL * 2;
            canvas.height = CELL * 2;
            const ctx = canvas.getContext('2d');
            const img1 = new Image();
            const img2 = new Image();
            let loaded = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img1, PAD,        PAD,        SIZE, SIZE);
                ctx.drawImage(img2, CELL + PAD, PAD,        SIZE, SIZE);
                ctx.drawImage(img2, PAD,        CELL + PAD, SIZE, SIZE);
                ctx.drawImage(img1, CELL + PAD, CELL + PAD, SIZE, SIZE);
                const bg = document.getElementById('bg-pattern');
                bg.style.backgroundImage = 'url(' + canvas.toDataURL('image/png') + ')';
                bg.style.backgroundSize  = (CELL * 2) + 'px ' + (CELL * 2) + 'px';
            }
            img1.onload = img2.onload = function () { if (++loaded === 2) draw(); };
            img1.src = 'assets/imgs/sciam_trasp.png';
            img2.src = 'assets/imgs/picts_trasp.png';
        })();
    </script>
